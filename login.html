<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | MÜŞTERİ ADI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <span class="logo-text">LOGONUZ</span>
      </a>
      <nav class="nav">
        <a href="index.html">Anasayfa</a>
        <a href="index.html#urunler">Ürünler</a>
      </nav>
    </div>
  </header>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div class="auth-container">
        <div class="auth-box">
          <h2>Giriş Yap</h2>
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label>E-posta</label>
              <input type="email" name="email" required>
            </div>
            <div class="form-group">
              <label>Şifre</label>
              <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-full">Giriş Yap</button>
          </form>
          <p class="auth-switch">Hesabınız yok mu? <a href="register.html">Kayıt Olun</a></p>
          <p class="auth-switch"><a href="admin-login.html">Admin Girişi</a></p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-col">
        <div class="logo">
          <span class="logo-text">LOGONUZ</span>
        </div>
        <p>Antalya'nın güvenilir perde montaj ve satış merkezi</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 MÜŞTERİ ADI. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script src="api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
