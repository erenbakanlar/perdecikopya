<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | MÜŞTERİ ADI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="images/logo.png" alt="MÜŞTERİ ADI" style="height: 120px; width: auto; display: block; margin: 0 auto;">
      </div>
      <nav class="admin-nav">
        <a href="admin-dashboard.html" class="active">📊 Dashboard</a>
        <a href="admin-products.html">🛍️ Ürünler</a>
        <a href="admin-customers.html">👥 Müşteriler</a>
        <a href="#" onclick="adminLogout()">🚪 Çıkış</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1>Dashboard</h1>
        <div class="admin-user">Admin</div>
      </header>

      <div class="admin-content">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
              <div class="stat-value" id="totalCustomers">0</div>
              <div class="stat-label">Müşteri Sayısı</div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="admin.js"></script>
  <script>
    checkAdminAuth();
    loadDashboardStats();
  </script>
</body>
</html>
