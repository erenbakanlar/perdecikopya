<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Girişi | MÜŞTERİ ADI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="section" style="padding-top: 80px;">
    <div class="container">
      <div class="auth-container">
        <div class="auth-box">
          <div style="text-align: center; margin-bottom: 30px;">
            <img src="images/logo.png" alt="MÜŞTERİ ADI" style="height: 120px; width: auto;">
          </div>
          <h2>Admin Paneli Girişi</h2>
          <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
            <div class="form-group">
              <label>Kullanıcı Adı</label>
              <input type="text" name="username" required>
            </div>
            <div class="form-group">
              <label>Şifre</label>
              <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-full">Giriş Yap</button>
          </form>
          <p class="auth-switch"><a href="login.html">Müşteri Girişi</a></p>
          <div style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; font-size: 14px;">
            <strong>Demo Giriş:</strong><br>
            Kullanıcı Adı: admin<br>
            Şifre: admin123
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
</body>
</html>
