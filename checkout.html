<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme | DuranOğlu Perde</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="DuranOğlu Perde" class="logo-img">
      </a>
      <nav class="nav">
        <a href="index.html">Anasayfa</a>
        <a href="cart.html">Sepete Dön</a>
      </nav>
    </div>
  </header>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <h1 style="margin-bottom: 40px;">Ödeme</h1>
      
      <div class="checkout-container">
        <div class="checkout-form">
          <form id="checkoutForm" onsubmit="processOrder(event)">
            <div class="form-section">
              <h3>Teslimat Bilgileri</h3>
              <div class="form-group">
                <label>Ad Soyad *</label>
                <input type="text" name="fullName" required>
              </div>
              <div class="form-group">
                <label>E-posta *</label>
                <input type="email" name="email" required>
              </div>
              <div class="form-group">
                <label>Telefon *</label>
                <input type="tel" name="phone" required>
              </div>
              <div class="form-group">
                <label>Adres *</label>
                <textarea name="address" rows="3" required></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>İl *</label>
                  <input type="text" name="city" value="Antalya" required>
                </div>
                <div class="form-group">
                  <label>İlçe *</label>
                  <input type="text" name="district" required>
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3>Ödeme Yöntemi</h3>
              <div class="payment-methods">
                <label class="payment-method">
                  <input type="radio" name="paymentMethod" value="card" checked>
                  <span>💳 Kredi/Banka Kartı</span>
                </label>
                <label class="payment-method">
                  <input type="radio" name="paymentMethod" value="transfer">
                  <span>🏦 Havale/EFT</span>
                </label>
                <label class="payment-method">
                  <input type="radio" name="paymentMethod" value="cash">
                  <span>💵 Kapıda Ödeme</span>
                </label>
              </div>

              <div id="cardPayment" class="payment-details">
                <div class="form-group">
                  <label>Kart Numarası *</label>
                  <input type="text" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Son Kullanma *</label>
                    <input type="text" name="expiry" placeholder="MM/YY" maxlength="5">
                  </div>
                  <div class="form-group">
                    <label>CVV *</label>
                    <input type="text" name="cvv" placeholder="123" maxlength="3">
                  </div>
                </div>
                <div class="form-group">
                  <label>Kart Üzerindeki İsim *</label>
                  <input type="text" name="cardName">
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-full">Siparişi Tamamla</button>
          </form>
        </div>

        <div class="checkout-summary">
          <h3>Sipariş Özeti</h3>
          <div id="checkoutItems"></div>
          <div class="summary-row">
            <span>Ara Toplam:</span>
            <span id="checkoutSubtotal">₺0,00</span>
          </div>
          <div class="summary-row">
            <span>Kargo:</span>
            <span>Ücretsiz</span>
          </div>
          <div class="summary-row total">
            <span>Toplam:</span>
            <span id="checkoutTotal">₺0,00</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-col">
        <div class="logo">
          <img src="images/logo.png" alt="DuranOğlu Perde" class="logo-img">
        </div>
        <p>Antalya'nın güvenilir perde montaj ve satış merkezi</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 DuranOğlu Perde. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script src="api.js"></script>
  <script src="cart.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
