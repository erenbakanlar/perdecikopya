<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sipariş Başarılı | DuranOğlu Perde</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="DuranOğlu Perde" class="logo-img">
      </a>
      <nav class="nav">
        <a href="index.html">Anasayfa</a>
      </nav>
    </div>
  </header>

  <section class="section" style="padding-top: 120px;">
    <div class="container">
      <div class="success-container">
        <div class="success-icon">✓</div>
        <h1>Siparişiniz Alındı!</h1>
        <p>Sipariş numaranız: <strong id="orderNumber"></strong></p>
        <p>Siparişiniz başarıyla oluşturuldu. En kısa sürede sizinle iletişime geçeceğiz.</p>
        <div style="margin-top: 40px;">
          <a href="index.html" class="btn">Anasayfaya Dön</a>
          <a href="index.html#urunler" class="btn btn-outline" style="margin-left: 10px;">Alışverişe Devam Et</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-content">
      <div class="footer-col">
        <div class="logo">
          <img src="images/logo.png" alt="DuranOğlu Perde" class="logo-img">
        </div>
        <p>Antalya'nın güvenilir perde montaj ve satış merkezi</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 DuranOğlu Perde. Tüm hakları saklıdır.</p>
    </div>
  </footer>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');
    if (orderId) {
      document.getElementById('orderNumber').textContent = orderId;
    }
  </script>
</body>
</html>
